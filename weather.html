<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.weather-card{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:280px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.city{
    font-size:26px;
    font-weight:bold;
    color:#333;
}

.temp{
    font-size:48px;
    margin:10px 0;
    color:#0077ff;
}

.condition{
    font-size:18px;
    color:#666;
}

button{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#0077ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#005fd1;
}
</style>

</head>
<body>

<div class="weather-card">
    <div class="city">Delhi</div>
    <div class="temp">32°C</div>
    <div class="condition">Sunny ☀️</div>
    <button onclick="refreshWeather()">Refresh</button>
</div>

<script>
function refreshWeather(){
    alert("Weather refreshed!");
}
</script>

</body>
</html>
