<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        select {
            display: block;
            margin: 20px auto;
            padding: 10px;
            font-size: 16px;
        }
        .news-item {
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
        }
        .news-item h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
        }
        .news-item p {
            margin: 0 0 10px 0;
            color: #666;
        }
        .news-item a {
            color: #007bff;
            text-decoration: none;
        }
        .news-item a:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            font-size: 18px;
            color: #999;
        }
        .error {
            text-align: center;
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>News on Selected Topic</h1>
        <select id="topicSelect">
            <option value="general">General</option>
            <option value="business">Business</option>
            <option value="entertainment">Entertainment</option>
            <option value="health">Health</option>
            <option value="science">Science</option>
            <option value="sports">Sports</option>
            <option value="technology">Technology</option>
        </select>
        <div id="newsContainer"></div>
    </div>

    <script>
        const rssFeeds = {
            general: 'http://feeds.bbci.co.uk/news/rss.xml',
            business: 'http://feeds.bbci.co.uk/news/business/rss.xml',
            entertainment: 'http://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml',
            health: 'http://feeds.bbci.co.uk/news/health/rss.xml',
            science: 'http://feeds.bbci.co.uk/news/science_and_environment/rss.xml',
            sports: 'http://feeds.bbci.co.uk/sport/rss.xml',
            technology: 'http://feeds.bbci.co.uk/news/technology/rss.xml'
        };

        const topicSelect = document.getElementById('topicSelect');
        const newsContainer = document.getElementById('newsContainer');

        async function fetchNews(category = 'general') {
            newsContainer.innerHTML = '<div class="loading">Loading news...</div>';
            try {
                const rssUrl = rssFeeds[category];
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                if (!response.ok) {
                    throw new Error('Failed to fetch news');
                }
                const data = await response.json();
                displayNews(data.items);
            } catch (error) {
                newsContainer.innerHTML = '<div class="error">Error loading news: ' + error.message + '</div>';
            }
        }

        function displayNews(articles) {
            if (!articles || articles.length === 0) {
                newsContainer.innerHTML = '<div class="error">No news found.</div>';
                return;
            }
            newsContainer.innerHTML = articles.slice(0, 10).map(article => `
                <div class="news-item">
                    <h2>${article.title}</h2>
                    <p>${article.description || 'No description available.'}</p>
                    <a href="${article.link}" target="_blank">Read more</a>
                </div>
            `).join('');
        }

        // Load default news on page load
        window.addEventListener('load', () => {
            fetchNews();
        });

        // Change topic
        topicSelect.addEventListener('change', () => {
            fetchNews(topicSelect.value);
        });
    </script>
</body>
</html>
